apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: hotel-log-analyzer
    spec:
      replicas: 2
      selector:
        matchLabels:
          app: hotel-log-analyzer
      template:
        metadata:
          labels:
            app: hotel-log-analyzer
        spec:
          containers:
          - name: hotel-log-analyzer
            image: ${DOCKER_USERNAME}/hotel-log-analyzer:latest
            ports:
            - containerPort: 8501
    ---
    apiVersion: v1
    kind: Service
    metadata:
      name: hotel-log-analyzer-service
    spec:
      type: LoadBalancer
      ports:
      - port: 80
        targetPort: 8501
      selector:
        app: hotel-log-analyzer
