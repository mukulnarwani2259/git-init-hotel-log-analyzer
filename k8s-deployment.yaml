apiVersion: apps/v1
kind: Deployment
metadata:
  name: log-pattern-analyzer
  labels:
    app: log-pattern-analyzer
spec:
  replicas: 2
  selector:
    matchLabels:
      app: log-pattern-analyzer
  template:
    metadata:
      labels:
        app: log-pattern-analyzer
    spec:
      containers:
        - name: app
          image: ghcr.io/YOUR_ORG/log-pattern-analyzer:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: log-pattern-analyzer-svc
spec:
  selector:
    app: log-pattern-analyzer
  ports:
    - port: 80
      targetPort: 80
  type: LoadBalancer
