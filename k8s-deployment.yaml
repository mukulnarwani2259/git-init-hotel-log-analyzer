apiVersion: apps/v1
kind: Deployment
metadata:
  name: hotel-log-analyzer
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hotel-log-analyzer
  template:
    metadata:
      labels:
        app: hotel-log-analyzer
    spec:
      containers:
        - name: hotel-log-analyzer
          image: mukulnarwani2259/hotel-log-analyzer:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8501
---
apiVersion: v1
kind: Service
metadata:
  name: hotel-log-analyzer-service
spec:
  type: LoadBalancer
  ports:
    - port: 80
      targetPort: 8501
  selector:
    app: hotel-log-analyzer
